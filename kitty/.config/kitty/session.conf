# Kitty session — tabs and splits auto-configured on startup

# ── Development ───────────────────────────────────────────────
# Two vertical splits: main panel (left) + small shell panel (right, ~90px)
new_tab Development
layout splits
launch --cwd ~
launch --location=vsplit --bias=15 --cwd ~

# ── Database ──────────────────────────────────────────────────
# Opens nvim in hive-core — run :DBUI manually inside nvim
new_tab Database
layout tall
launch --cwd ~/projects/operations/hive-core nvim

# ── k9s ───────────────────────────────────────────────────────
new_tab k9s
layout tall
launch k9s

# ── Shell ─────────────────────────────────────────────────────
# Root level shell for yazi, docker, general use
new_tab Shell
layout tall
launch --cwd ~
