# Kitty session — tabs and splits auto-configured on startup

# ── Development ───────────────────────────────────────────────
# Two vertical splits: main panel (left) + small shell panel (right, ~90px)
new_tab Development
layout splits
launch --cwd ~
launch --location=vsplit --bias=15 --cwd ~

# ── Database ──────────────────────────────────────────────────
# Opens in hive-core — run nvim + :DBUI manually
new_tab Database
layout tall
launch --cwd ~/projects/operations/hive-core

# ── k9s ───────────────────────────────────────────────────────
new_tab k9s
layout tall
launch --cwd ~

# ── Shell ─────────────────────────────────────────────────────
# Root level shell for yazi, docker, general use
new_tab Shell
layout tall
launch --cwd ~
